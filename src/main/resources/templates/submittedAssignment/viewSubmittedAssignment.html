<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Submission — OCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e; --accent: #e8ff47; --accent2: #47c8ff; --text: #f0f0f0; --text-muted: #888; --danger: #ff4747; --success: #47ff8f; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 8px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; transition: all 0.2s; }
        .nav-logout:hover { border-color: var(--danger); color: var(--danger); }
        main { max-width: 800px; margin: 0 auto; padding: 2.5rem 2rem; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.2rem; }
        .card-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .info-row { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); }
        .grade-box { background: var(--surface2); border-radius: 8px; padding: 1.2rem; text-align: center; }
        .grade-value { font-family: var(--font-display); font-size: 2.5rem; font-weight: 800; color: var(--success); }
        .grade-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem; }
        .feedback-text { color: var(--text-muted); line-height: 1.6; font-size: 0.9rem; }
        .file-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .file-item:last-child { border-bottom: none; }
        .actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem; border-radius: 8px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #0f0f0f; }
        .btn-primary:hover { background: #d4eb30; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-muted); }
        .badge-pending { display:inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: #88888820; color: var(--text-muted); border: 1px solid #88888840; }
        .badge-graded { display:inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: #47ff8f20; color: var(--success); border: 1px solid #47ff8f40; }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/course/view/courses">OCMS</a>
    <ul class="nav-links">
        <li><a href="/course/view/courses">Courses</a></li>
        <li><a href="/user/view/dashboard">Dashboard</a></li>
        <li>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="nav-logout" type="submit">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<main>
    <div class="page-header">
        <h1>Submission</h1>
    </div>

    <!-- Submission Info -->
    <div class="card">
        <div class="card-title">Details</div>
        <div class="info-row">
            <span class="info-label">Assignment</span>
            <span th:text="${submittedAssignmentResponse.assignmentName}">Name</span>
        </div>
        <div class="info-row">
            <span class="info-label">Status</span>
            <span class="badge-graded" th:if="${submittedAssignmentResponse.grade != null}">Graded</span>
            <span class="badge-pending" th:if="${submittedAssignmentResponse.grade == null}">Pending</span>
        </div>
    </div>

    <!-- Grade -->
    <div class="card" th:if="${submittedAssignmentResponse.grade != null}">
        <div class="card-title">Grade & Feedback</div>
        <div class="grade-box" style="margin-bottom:1rem">
            <div class="grade-value" th:text="${submittedAssignmentResponse.grade}">A</div>
            <div class="grade-label">Grade</div>
        </div>
        <p class="feedback-text" th:text="${submittedAssignmentResponse.feedBack}">Feedback here</p>
    </div>

    <!-- Files -->
    <div class="card">
        <div class="card-title">Submitted Files</div>
        <div th:if="${#lists.isEmpty(submittedAssignmentResponse.submittedAssignmentFiles)}"
             style="color:var(--text-muted);font-size:0.9rem">No files submitted</div>
        <div th:each="file : ${submittedAssignmentResponse.submittedAssignmentFiles}" class="file-item">
            <span class="file-icon">📄</span>
            <span style="flex:1" th:text="${file.fileName}">filename</span>
            <a th:href="@{/submittedAssignment/view/file/download/{guid}(guid=${file.documentGuide})}"
               class="btn btn-info"
               style="padding:0.3rem 0.8rem;font-size:0.8rem">
                ⬇ Download
            </a>
        </div>
    </div>

    <!-- Actions -->
    <div class="actions">
        <!-- Student can update if not graded -->
        <a th:href="@{/submittedAssignment/view/updateSubmittedAssignment/{id}(id=${submittedAssignmentId})}"
           class="btn btn-secondary"
           th:if="${isOwner and submittedAssignmentResponse.grade == null}">Edit Submission</a>
        <form th:action="@{/submittedAssignment/view/deleteSubmittedAssignment/{id}(id=${submittedAssignmentId})}"
              method="post"
              th:if="${isOwner and submittedAssignmentResponse.grade == null}">
            <input type="hidden" name="_method" value="DELETE"/>
            <button type="submit" class="btn btn-danger">DELETE</button>
        </form>

        <!-- Instructor can grade -->
        <a th:href="@{/submittedAssignment/view/gradeSubmittedAssignment/{id}(id=${submittedAssignmentId})}"
           class="btn btn-primary" th:if="${canManage}">Grade Submission</a>
    </div>
</main>
</body>
</html>
