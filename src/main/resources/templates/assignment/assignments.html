<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Assignments — OCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e; --accent: #e8ff47; --accent2: #47c8ff; --text: #f0f0f0; --text-muted: #888; --danger: #ff4747; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 8px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; transition: all 0.2s; }
        .nav-logout:hover { border-color: var(--danger); color: var(--danger); }
        main { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
        .page-header h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        .page-header p { color: var(--text-muted); margin-top: 0.4rem; }
        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem; border-radius: 8px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #0f0f0f; }
        .btn-primary:hover { background: #d4eb30; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-muted); }
        .assignment-list { display: flex; flex-direction: column; gap: 0.8rem; }
        .assignment-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .assignment-card:hover { border-color: var(--accent2); }
        .assignment-info h3 { font-family: var(--font-display); font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .assignment-info p { color: var(--text-muted); font-size: 0.85rem; }
        .assignment-due { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
        .assignment-due span { color: var(--accent2); }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state h3 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/course/view/courses">OCMS</a>
    <ul class="nav-links">
        <li><a href="/course/view/courses">Courses</a></li>
        <li sec:authorize="hasRole('INSTRUCTOR')"><a href="/course/view/createCourse">+ New Course</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a href="/admin/view/users">Admin</a></li>
        <li><a href="/user/view/dashboard">Dashboard</a></li>
        <li>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="nav-logout" type="submit">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<main>
    <div class="page-header">
        <div>
            <h1>Assignments</h1>
            <p>All assignments for this course</p>
        </div>
        <div style="display:flex;gap:0.8rem;align-items:center">
            <a th:href="@{/course/view/viewCourse/{id}(id=${courseId})}" class="btn btn-secondary">← Back to Course</a>
            <a th:href="@{/assignment/view/createAssignment/{id}(id=${courseId})}"
               class="btn btn-primary" th:if="${canManage}">+ New Assignment</a>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(assignmentResponses)}">
        <div class="empty-state-icon">📝</div>
        <h3>No assignments yet</h3>
        <p th:if="${canManage}">Create the first assignment for this course</p>
        <p th:if="${!canManage}">No assignments have been posted yet</p>
    </div>

    <div class="assignment-list" th:if="${!#lists.isEmpty(assignmentResponses)}">
        <div th:each="assignment : ${assignmentResponses}" class="assignment-card">
            <div class="assignment-info">
                <h3 th:text="${assignment.title}">Assignment Title</h3>
                <p th:text="${assignment.description}">Description</p>
                <div class="assignment-due">Due: <span th:text="${assignment.dueDate}">date</span></div>
            </div>
            <div style="display:flex;gap:0.5rem">
                <a th:href="@{/assignment/view/viewAssignment/{id}(id=${assignment.id})}"
                   class="btn btn-secondary" style="padding:0.4rem 0.8rem;font-size:0.8rem">View</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
