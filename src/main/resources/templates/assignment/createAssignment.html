<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Assignment — OCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e; --accent: #e8ff47; --text: #f0f0f0; --text-muted: #888; --danger: #ff4747; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 8px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; transition: all 0.2s; }
        .nav-logout:hover { border-color: var(--danger); color: var(--danger); }
        main { max-width: 680px; margin: 0 auto; padding: 2.5rem 2rem; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        .page-header p { color: var(--text-muted); margin-top: 0.4rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.95rem; transition: border-color 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        textarea { resize: vertical; min-height: 120px; }
        .file-upload { border: 2px dashed var(--border); border-radius: 8px; padding: 1.5rem; text-align: center; transition: border-color 0.2s; }
        .file-upload:hover { border-color: var(--accent); }
        .file-upload input[type="file"] { display: none; }
        .file-upload-label { cursor: pointer; color: var(--text-muted); font-size: 0.9rem; }
        .file-upload-label span { color: var(--accent); }
        .form-actions { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 1.5rem; }
        .btn { display: inline-flex; align-items: center; padding: 0.65rem 1.3rem; border-radius: 8px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #0f0f0f; }
        .btn-primary:hover { background: #d4eb30; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-muted); }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/course/view/courses">OCMS</a>
    <ul class="nav-links">
        <li><a href="/course/view/courses">Courses</a></li>
        <li sec:authorize="hasRole('INSTRUCTOR')"><a href="/course/view/createCourse">+ New Course</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a href="/admin/view/users">Admin</a></li>
        <li><a href="/user/view/dashboard">Dashboard</a></li>
        <li>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="nav-logout" type="submit">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<main>
    <div class="page-header">
        <h1>New Assignment</h1>
        <p>Create an assignment for your students</p>
    </div>
    <div class="card">
        <form th:action="@{/assignment/view/createAssignment}" th:object="${assignmentRequest}"
              method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{courseId}"/>

            <div class="form-group">
                <label>Title</label>
                <input type="text" th:field="*{title}" placeholder="Assignment title" required/>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" placeholder="Describe what students need to do"></textarea>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" th:field="*{dueDate}" required/>
            </div>
            <div class="form-group">
                <label>Files (optional)</label>
                <div class="file-upload">
                    <input type="file" id="files" name="assignmentFiles" multiple accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.png"/>
                    <label class="file-upload-label" for="files">Drop files or <span>browse</span></label>
                </div>
            </div>
            <div class="form-actions">
                <a th:href="@{/assignment/view/assignments/{id}(id=${assignmentRequest.courseId})}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Assignment</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
