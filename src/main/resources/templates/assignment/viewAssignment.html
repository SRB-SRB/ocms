<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${assignmentResponse.title} + ' — OCMS'">Assignment — OCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e; --accent: #e8ff47; --accent2: #47c8ff; --text: #f0f0f0; --text-muted: #888; --danger: #ff4747; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 8px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; transition: all 0.2s; }
        .nav-logout:hover { border-color: var(--danger); color: var(--danger); }
        main { max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem; }
        .breadcrumb { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .breadcrumb a { color: var(--text-muted); text-decoration: none; }
        .breadcrumb a:hover { color: var(--accent); }
        .hero { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.2rem; }
        .hero h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.8rem; }
        .meta { display: flex; gap: 1.5rem; margin-bottom: 1rem; }
        .meta-item { font-size: 0.85rem; color: var(--text-muted); }
        .meta-item span { color: var(--accent2); font-weight: 500; }
        .hero p { color: var(--text-muted); line-height: 1.7; }
        .actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem; border-radius: 8px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #0f0f0f; }
        .btn-primary:hover { background: #d4eb30; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-muted); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-info { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
        .btn-info:hover { background: var(--accent2); color: #0f0f0f; }
        .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.2rem; }
        .section-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .file-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .file-item:last-child { border-bottom: none; }
        .empty-text { color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/course/view/courses">OCMS</a>
    <ul class="nav-links">
        <li><a href="/course/view/courses">Courses</a></li>
        <li sec:authorize="hasRole('INSTRUCTOR')"><a href="/course/view/createCourse">+ New Course</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a href="/admin/view/users">Admin</a></li>
        <li><a href="/user/view/dashboard">Dashboard</a></li>
        <li>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="nav-logout" type="submit">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<main>
    <div class="breadcrumb">
        <a href="/course/view/courses">Courses</a> /
        <a th:href="@{/assignment/view/assignments/{id}(id=${assignmentResponse.courseId})}">Assignments</a> /
        <span th:text="${assignmentResponse.title}">Assignment</span>
    </div>

    <div class="hero">
        <h1 th:text="${assignmentResponse.title}">Assignment Title</h1>
        <div class="meta">
            <div class="meta-item">Course: <span th:text="${assignmentResponse.courseName}">Course</span></div>
            <div class="meta-item">Due: <span th:text="${assignmentResponse.dueDate}">Date</span></div>
            <div class="meta-item">Created: <span th:text="${assignmentResponse.creationDate}">Date</span></div>
        </div>
        <p th:text="${assignmentResponse.description}">Description</p>

        <div class="actions">
            <!-- Student actions -->
            <a th:href="@{/submittedAssignment/view/submitAssignment/{id}(id=${assignmentId})}"
               class="btn btn-primary" th:if="${isEnrolled and !canManage and submittedAssignment==null}">Submit Assignment</a>
            <a th:href="@{/submittedAssignment/view/viewSubmittedAssignment/{id}(id=${submittedAssignment.getId()})}"
               class="btn btn-secondary"
               th:if="${submittedAssignment!=null}">View Your Submission</a>

            <!-- Instructor actions -->
            <a th:href="@{/submittedAssignment/view/submissions/{id}(id=${assignmentId})}"
               class="btn btn-secondary" th:if="${canManage}">View Submissions</a>
            <a th:href="@{/assignment/view/update/{id}(id=${assignmentId})}"
               class="btn btn-secondary" th:if="${canManage}">Edit</a>
            <form th:if="${canManage}"
                  th:action="@{/assignment/view/delete/{id}(id=${assignmentId})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('Delete this assignment?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="DELETE"/>
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>

    <!-- Files -->
    <div class="section">
        <div class="section-title">Assignment Files</div>
        <div th:if="${#lists.isEmpty(assignmentResponse.assignmentFiles)}" class="empty-text">No files attached</div>
        <div th:each="file : ${assignmentResponse.assignmentFiles}" class="file-item">
            <span class="file-icon">📄</span>
            <span style="flex:1" th:text="${file.fileName}">filename</span>
            <a th:href="@{/assignment/view/file/download/{guid}(guid=${file.documentGuide})}"
               class="btn btn-info"
               style="padding:0.3rem 0.8rem;font-size:0.8rem">
                ⬇ Download
            </a>
        </div>
    </div>
</main>
</body>
</html>
