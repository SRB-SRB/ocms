<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Enrollments — OCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e; --accent: #e8ff47; --accent2: #47c8ff; --text: #f0f0f0; --text-muted: #888; --danger: #ff4747; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 8px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; transition: all 0.2s; }
        .nav-logout:hover { border-color: var(--danger); color: var(--danger); }
        main { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
        .page-header h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        .page-header p { color: var(--text-muted); margin-top: 0.4rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 0.75rem 1.2rem; border-bottom: 1px solid var(--border); background: var(--surface2); }
        td { padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-instructor { background: #e8ff4720; color: var(--accent); border: 1px solid #e8ff4740; }
        .badge-student { background: #47c8ff20; color: var(--accent2); border: 1px solid #47c8ff40; }
        .btn { display: inline-flex; align-items: center; padding: 0.35rem 0.8rem; border-radius: 6px; font-family: var(--font-body); font-size: 0.8rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #0f0f0f; }
        .btn-primary:hover { background: #d4eb30; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-muted); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .actions-cell { display: flex; gap: 0.4rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/course/view/courses">OCMS</a>
    <ul class="nav-links">
        <li><a href="/course/view/courses">Courses</a></li>
        <li sec:authorize="hasRole('INSTRUCTOR')"><a href="/course/view/createCourse">+ New Course</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a href="/admin/view/users">Admin</a></li>
        <li><a href="/user/view/dashboard">Dashboard</a></li>
        <li>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="nav-logout" type="submit">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<main>
    <div class="page-header">
        <div>
            <h1>Enrollments</h1>
            <p>Manage students enrolled in this course</p>
        </div>
        <a th:href="@{/course/view/viewCourse/{id}(id=${courseId})}" class="btn btn-secondary" style="padding:0.6rem 1.2rem;font-size:0.9rem">← Back</a>
    </div>

    <div class="card">
        <div class="empty-state" th:if="${#lists.isEmpty(enrollments)}">No students enrolled yet</div>
        <table th:if="${!#lists.isEmpty(enrollments)}">
            <thead>
            <tr>
                <th>User ID</th>
                <th>Role</th>
                <th th:if="${isOwner}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="enrollment : ${enrollments}">
                <td>
                    <div th:text="${enrollment.userName}">Name</div>
                    <div style="font-size:0.8rem;color:var(--text-muted)" th:text="${enrollment.userEmail}">email</div>
                </td>
                <td>
                    <span class="badge badge-instructor" th:if="${enrollment.roleInCourse == 'INSTRUCTOR'}" th:text="${enrollment.roleInCourse}"></span>
                    <span class="badge badge-student" th:if="${enrollment.roleInCourse == 'STUDENT'}" th:text="${enrollment.roleInCourse}"></span>
                </td>
                <td th:if="${isOwner}">
                    <div class="actions-cell">
                        <!-- Promote student -->
                        <form th:if="${enrollment.roleInCourse == 'STUDENT'}"
                              th:action="@{/enrollment/view/promote}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="userId" th:value="${enrollment.userId}"/>
                            <input type="hidden" name="courseId" th:value="${courseId}"/>
                            <button type="submit" class="btn btn-primary">Promote</button>
                        </form>
                        <!-- Demote instructor -->
                        <form th:if="${enrollment.roleInCourse == 'INSTRUCTOR'}"
                              th:action="@{/enrollment/view/demote}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="userId" th:value="${enrollment.userId}"/>
                            <input type="hidden" name="courseId" th:value="${courseId}"/>
                            <button type="submit" class="btn btn-secondary">Demote</button>
                        </form>
                        <!-- Remove -->
                        <form th:action="@{/enrollment/view/cancel/{id}(id=${enrollment.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="_method" value="DELETE"/>
                            <input type="hidden" name="courseId" th:value="${courseId}"/>
                            <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('Remove this enrollment?')">Remove</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
