<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${courseResponse.title} + ' — OCMS'">Course — OCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e; --accent: #e8ff47; --accent2: #47c8ff; --text: #f0f0f0; --text-muted: #888; --danger: #ff4747; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 8px; transition: all 0.2s; }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; transition: all 0.2s; }
        .nav-logout:hover { border-color: var(--danger); color: var(--danger); }
        main { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }
        .breadcrumb { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .breadcrumb a { color: var(--text-muted); text-decoration: none; }
        .breadcrumb a:hover { color: var(--accent); }
        .course-hero {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 2.5rem; margin-bottom: 1.5rem;
        }
        .course-hero h1 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 1rem; }
        .course-hero p { color: var(--text-muted); line-height: 1.7; font-size: 1rem; }
        .course-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem; border-radius: 8px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #0f0f0f; }
        .btn-primary:hover { background: #d4eb30; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-muted); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-info { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
        .btn-info:hover { background: var(--accent2); color: #0f0f0f; }
        .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.2rem; }
        .section-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .file-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .file-item:last-child { border-bottom: none; }
        .file-icon { font-size: 1.1rem; }
        .empty-text { color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 1rem; }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/course/view/courses">OCMS</a>
    <ul class="nav-links">
        <li><a href="/course/view/courses">Courses</a></li>
        <li sec:authorize="hasRole('INSTRUCTOR')"><a href="/course/view/createCourse">+ New Course</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a href="/admin/view/users">Admin</a></li>
        <li><a href="/user/view/dashboard">Dashboard</a></li>
        <li>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="nav-logout" type="submit">Logout</button>
            </form>
        </li>
    </ul>
</nav>
<main>
    <div class="breadcrumb">
        <a href="/course/view/courses">Courses</a> / <span th:text="${courseResponse.title}">Course</span>
    </div>

    <div class="course-hero">
        <h1 th:text="${courseResponse.title}">Course Title</h1>
        <p th:text="${courseResponse.description}">Course description goes here.</p>

        <div class="course-actions">
            <!-- Enroll button — for students not yet managing -->
            <a th:href="@{/enrollment/view/enroll/{id}(id=${courseId})}"
               class="btn btn-primary" th:if="${!isEnrolled}">Enroll Now</a>

            <!-- Manage buttons — for course instructors -->
            <a th:href="@{/assignment/view/assignments/{id}(id=${courseId})}"
               class="btn btn-secondary" th:if="${isEnrolled}">Assignments</a>

            <a th:href="@{/enrollment/view/course/{id}(id=${courseId})}"
               class="btn btn-secondary" th:if="${canManage}">Enrollments</a>

            <a th:href="@{/course/view/update/{id}(id=${courseId})}"
               class="btn btn-secondary" th:if="${canManage}">Edit Course</a>

            <!-- Delete — only owner -->
            <form th:if="${isOwner}"
                  th:action="@{/course/view/delete/{id}(id=${courseId})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('Delete this course? This cannot be undone.')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="DELETE"/>
                <button type="submit" class="btn btn-danger">Delete Course</button>
            </form>
        </div>
    </div>

    <!-- Course Files -->
    <div class="section">
        <div class="section-title">
            Course Files
            <span style="font-size:0.8rem;color:var(--text-muted);font-weight:400"
                  th:text="${#lists.size(courseResponse.courseFiles)} + ' files'"></span>
        </div>
        <div th:if="${#lists.isEmpty(courseResponse.courseFiles)}" class="empty-text">
            No files uploaded yet
        </div>
        <div th:each="file : ${courseResponse.courseFiles}" class="file-item">
            <span class="file-icon">📄</span>
            <span th:text="${file.documentGuide}">filename</span>
        </div>
    </div>

    <!-- Assignments section -->
    <div class="section" th:if="${canManage}">
        <div class="section-title">
            Assignments
            <a th:href="@{/assignment/view/createAssignment/{id}(id=${courseId})}"
               class="btn btn-primary" style="padding:0.3rem 0.8rem;font-size:0.8rem">+ Add</a>
        </div>
        <a th:href="@{/assignment/view/assignments/{id}(id=${courseId})}"
           style="color:var(--accent);text-decoration:none;font-size:0.9rem">
            View all assignments →
        </a>
    </div>
</main>
</body>
</html>
