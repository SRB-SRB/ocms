<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — OCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
            --border: #2e2e2e; --accent: #e8ff47; --text: #f0f0f0;
            --text-muted: #888; --danger: #ff4747;
            --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: var(--font-body); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 2rem;
        }
        .form-box {
            width: 100%; max-width: 480px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 2.5rem;
        }
        .brand {
            font-family: var(--font-display); font-size: 1.2rem;
            font-weight: 800; color: var(--accent);
            margin-bottom: 2rem; display: block;
        }
        h2 {
            font-family: var(--font-display); font-size: 1.8rem;
            font-weight: 800; margin-bottom: 0.4rem;
        }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label {
            display: block; font-size: 0.8rem; font-weight: 500;
            color: var(--text-muted); margin-bottom: 0.4rem;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        input {
            width: 100%; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 0.75rem 1rem; color: var(--text);
            font-family: var(--font-body); font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); }
        input::placeholder { color: var(--text-muted); }
        .btn-register {
            width: 100%; background: var(--accent); color: #0f0f0f;
            border: none; border-radius: 8px; padding: 0.85rem;
            font-family: var(--font-display); font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
        }
        .btn-register:hover { background: #d4eb30; }
        .login-link {
            text-align: center; margin-top: 1.5rem;
            font-size: 0.9rem; color: var(--text-muted);
        }
        .login-link a { color: var(--accent); text-decoration: none; }
        .role-note {
            background: #e8ff4710; border: 1px solid #e8ff4730;
            border-radius: 8px; padding: 0.75rem 1rem;
            font-size: 0.85rem; color: var(--accent); margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
<div class="form-box">
    <span class="brand">OCMS</span>
    <h2>Create account</h2>
    <p class="subtitle">Join as a student — request instructor access later</p>

    <div class="role-note">
        ✦ All accounts start as Student. Admins can promote you to Instructor.
    </div>

    <form th:action="@{/auth/view/register}" method="post" th:object="${userRequest}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
            <label>Contact</label>
            <input type="text" th:field="*{contact}" placeholder="+977 9800000000"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="••••••••" required/>
        </div>

        <button class="btn-register" type="submit">Create Account</button>
    </form>
    <div class="login-link">
        Already have an account? <a href="/auth/view/login">Sign in</a>
    </div>
</div>
</body>
</html>
