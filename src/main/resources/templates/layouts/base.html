<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} ?: 'OCMS'">OCMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --accent: #e8ff47;
            --accent2: #47c8ff;
            --text: #f0f0f0;
            --text-muted: #888;
            --danger: #ff4747;
            --success: #47ff8f;
            --radius: 12px;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-links .active { color: var(--text); background: var(--surface2); }
        .nav-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* ── Main Layout ── */
        main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }
        .card-header {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* ── Page Header ── */
        .page-header {
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .page-header p { color: var(--text-muted); margin-top: 0.4rem; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #0f0f0f; }
        .btn-primary:hover { background: #d4eb30; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-muted); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-info { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
        .btn-info:hover { background: var(--accent2); color: #0f0f0f; }
        .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }

        /* ── Forms ── */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-control {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-control:focus { outline: none; border-color: var(--accent); }
        .form-control::placeholder { color: var(--text-muted); }

        /* ── Tables ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-instructor { background: #e8ff4720; color: var(--accent); border: 1px solid #e8ff4740; }
        .badge-student { background: #47c8ff20; color: var(--accent2); border: 1px solid #47c8ff40; }
        .badge-admin { background: #ff474720; color: var(--danger); border: 1px solid #ff474740; }
        .badge-graded { background: #47ff8f20; color: var(--success); border: 1px solid #47ff8f40; }
        .badge-pending { background: #88888820; color: var(--text-muted); border: 1px solid #88888840; }

        /* ── Grid ── */
        .grid { display: grid; gap: 1rem; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        /* ── Utilities ── */
        .flex { display: flex; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-end { display: flex; justify-content: flex-end; gap: 0.5rem; }
        .gap-1 { gap: 0.5rem; }
        .gap-2 { gap: 1rem; }
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .text-muted { color: var(--text-muted); font-size: 0.9rem; }
        .text-accent { color: var(--accent); }
        .text-danger { color: var(--danger); }
        .text-success { color: var(--success); }

        /* ── Alert ── */
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .alert-danger { background: #ff474715; border: 1px solid #ff474740; color: var(--danger); }
        .alert-success { background: #47ff8f15; border: 1px solid #47ff8f40; color: var(--success); }

        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            nav { padding: 0 1rem; }
            main { padding: 1rem; }
        }
    </style>
    <th:block th:replace="${extraStyles}"></th:block>
</head>
<body>

<!-- ── Navbar ── -->
<nav th:fragment="navbar">
    <a class="nav-brand" href="/course/view/courses">OCMS</a>
    <ul class="nav-links">
        <li><a href="/course/view/courses">Courses</a></li>

        <!-- INSTRUCTOR only -->
        <li sec:authorize="hasRole('INSTRUCTOR')">
            <a href="/course/view/createCourse">+ New Course</a>
        </li>

        <!-- ADMIN only -->
        <li sec:authorize="hasRole('ADMIN')">
            <a href="/admin/view/users">Admin</a>
        </li>

        <!-- Dashboard -->
        <li><a href="/user/view/dashboard">Dashboard</a></li>

        <!-- Logout -->
        <li>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="nav-logout" type="submit">Logout</button>
            </form>
        </li>
    </ul>
</nav>

<main th:fragment="content">
    <!-- Page content goes here -->
</main>

</body>
</html>
