spring:
  application:
    name: ocms


  datasource:
    url: jdbc:postgresql://localhost:5432/ocms_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
    upload:
      dir: /var/myapp/uploads
