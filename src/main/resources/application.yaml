spring:
  application:
    name: ocms
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB


  datasource:
    url: jdbc:postgresql://localhost:5432/ocms_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mvc:
    hiddenmethod:
      filter:
        enabled: true
app:
    upload:
      dir: /var/myapp/uploads
